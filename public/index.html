<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>NYSA CRM</title>
<style>
 :root{
  --bg:#f5f4ef;--panel:#ffffff;--panel2:#f0efe9;--border:#deddd5;--text:#20241f;--muted:#73786f;
  --gold:#a68443;--gold-dim:#80672f;--green:#397456;--amber:#a66d22;--red:#a94f42;--blue:#426d8a;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
 body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
 input,select,textarea{font-family:inherit;font-size:13px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold-dim)}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
 .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 16px;border-radius:6px;font-size:13px;transition:all .15s}
.btn:hover{border-color:var(--gold-dim)}
 .btn-primary{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
.btn-primary:hover{background:#d9bd7e}
.btn-danger{color:var(--red);border-color:#4a332e}
.btn-sm{padding:4px 10px;font-size:12px}
.hidden{display:none!important}
 header{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.96);position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;justify-self:start}
.brand-logo{display:block;width:auto;height:58px}
.system-name{justify-self:center;color:var(--gold);font-size:34px;font-weight:600;line-height:1;letter-spacing:.32em;padding-left:.32em}
.userbox{display:flex;align-items:center;justify-self:end;gap:12px;font-size:13px}
.userbox .role{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);border:1px solid var(--gold-dim);border-radius:20px;padding:2px 10px}
 nav.tabs{display:flex;gap:4px;padding:0 28px;border-bottom:1px solid var(--border);background:var(--panel)}
nav.tabs button{background:none;border:none;color:var(--muted);padding:12px 18px;font-size:13px;border-bottom:2px solid transparent;letter-spacing:.03em}
nav.tabs button.active{color:var(--text);border-bottom-color:var(--gold)}
main{padding:22px 28px;max-width:1500px;margin:0 auto}
/* login */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:38px;width:400px}
.auth-card h1{font-size:20px;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;text-align:center}
.auth-card .sub{text-align:center;color:var(--muted);font-size:12px;margin:6px 0 26px;letter-spacing:.05em}
.auth-card .field{margin-bottom:14px}
.auth-card .switch{text-align:center;margin-top:18px;font-size:12px;color:var(--muted)}
.auth-card .switch a{color:var(--gold);cursor:pointer;text-decoration:none}
.error-msg{background:#3a2420;border:1px solid #5a382f;color:#e8a598;padding:9px 12px;border-radius:6px;font-size:12px;margin-bottom:14px}
.info-msg{background:#20303a;border:1px solid #2f4a5a;color:#98c8e8;padding:9px 12px;border-radius:6px;font-size:12px;margin-bottom:14px}
/* filters */
.filterbar{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:18px}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.filter-actions{display:flex;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap}
.result-count{color:var(--muted);font-size:12px;margin-left:auto}
/* cards */
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .15s;position:relative}
.card:hover{border-color:var(--gold-dim)}
.card h3{font-size:15px;margin-bottom:2px;padding-right:80px}
.card .meta{color:var(--muted);font-size:12px;margin-bottom:10px}
.card .price{font-size:18px;color:var(--gold);font-weight:600}
.card .price small{color:var(--muted);font-weight:400;font-size:11px}
.card .specs{display:flex;gap:14px;color:var(--muted);font-size:12px;margin:8px 0}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.badge{font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
.badge.status-Available{color:var(--green);border-color:#2e4a3c}
.badge.status-Reserved{color:var(--amber);border-color:#4a3f28}
.badge.status-Under.offer,.badge.under-offer{color:var(--blue);border-color:#2e3d4a}
.badge.status-Closed{color:var(--red);border-color:#4a332e}
.badge.tier{color:var(--gold);border-color:var(--gold-dim)}
.discount-tag{position:absolute;top:14px;right:14px;background:#233527;color:var(--green);font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px}
.comment-ct{display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:13px;padding-top:9px}.comment-ct span:nth-child(2){margin-left:auto}.comment-ct b{color:var(--gold-dim);font-weight:600}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(6,8,12,.75);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:760px;padding:26px}
.modal h2{font-size:17px;margin-bottom:16px;color:var(--gold);letter-spacing:.04em}
.modal .close-x{float:right;background:none;border:none;color:var(--muted);font-size:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-grid .span2{grid-column:span 2}.form-grid .span3{grid-column:span 3}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
/* detail */
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.detail-price{font-size:24px;color:var(--gold);font-weight:600}
.kv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0;background:var(--panel2);border-radius:8px;padding:16px}
.kv-grid div b{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:2px}
.notes-block{background:var(--panel2);border-left:3px solid var(--gold-dim);border-radius:6px;padding:12px;margin-bottom:16px;font-size:13px;color:#cfccc5}
/* comments */
.comments{border-top:1px solid var(--border);margin-top:18px;padding-top:16px}
.comments h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.comment{padding:10px 0;border-bottom:1px solid #20242e}
.comment .c-head{display:flex;gap:8px;align-items:baseline;font-size:12px}
.comment .c-head b{color:var(--text)}
.comment .c-head span{color:var(--muted);font-size:11px}
.comment p{margin-top:3px;font-size:13px;color:#cfccc5}
.comment .c-actions{margin-top:4px;display:flex;gap:10px}
.comment .c-actions a{font-size:11px;color:var(--muted);cursor:pointer}
.comment .c-actions a:hover{color:var(--gold)}
.comment-form{display:flex;gap:10px;margin-top:14px}
/* tables */
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel2)}
td{padding:10px 14px;border-bottom:1px solid #20242e;font-size:13px}
tr:last-child td{border-bottom:none}
.admin-section{margin-bottom:30px}
.admin-section h2{font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:12px}
.admin-toolbar{display:flex;gap:10px;margin-bottom:12px;align-items:end;flex-wrap:wrap}
.mono{font-family:ui-monospace,Consolas,monospace;font-size:12px}
.pill{font-size:10px;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.pill.active{color:var(--green);border-color:#2e4a3c}.pill.revoked,.pill.expired{color:var(--red);border-color:#4a332e}
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel2);border:1px solid var(--gold-dim);color:var(--text);padding:12px 18px;border-radius:8px;z-index:200;font-size:13px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
 .empty{text-align:center;color:var(--muted);padding:60px 0;font-size:13px}
 .dashboard-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin:4px 0 22px}
 .dashboard-head h2{font-size:28px;line-height:1.15;font-weight:600;letter-spacing:-.01em;margin:4px 0 7px}
 .dashboard-head p{color:var(--muted);font-size:13px}
 .eyebrow{font-size:10px;letter-spacing:.13em;color:var(--gold-dim);font-weight:700}
 .dashboard-actions{display:flex;gap:8px;flex-wrap:wrap}
 .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
 .stat-card{background:var(--panel);border:1px solid var(--border);padding:16px 18px;min-height:116px}
 .stat-card span,.stat-card small{display:block;color:var(--muted);font-size:12px}.stat-card strong{display:block;font-size:30px;line-height:1.1;margin:12px 0 6px;color:var(--text);font-weight:600}
 .dashboard-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(300px,.65fr);gap:18px}
 .dashboard-panel{background:var(--panel);border:1px solid var(--border);padding:18px}
 .panel-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}.panel-head h3{font-size:16px;font-weight:600;margin-top:4px}.text-btn{background:none;border:0;color:var(--gold-dim);font-size:12px;cursor:pointer;padding:2px}
 .recent-list{border-top:1px solid var(--border)}.recent-row{width:100%;display:flex;align-items:center;gap:11px;text-align:left;background:none;border:0;border-bottom:1px solid var(--border);padding:12px 2px;color:var(--text)}.recent-row:hover{background:var(--panel2)}.recent-main{display:flex;flex-direction:column;min-width:0;flex:1}.recent-main b{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.recent-main small{color:var(--muted);font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.recent-tag{font-size:10px;color:var(--muted);white-space:nowrap}.recent-status{width:7px;height:7px;border-radius:50%;background:var(--muted)}.recent-status.status-Available{background:var(--green)}.recent-status.status-Reserved{background:var(--amber)}.recent-status.status-Under.offer{background:var(--blue)}.recent-status.status-Closed{background:var(--red)}
 .action-list{display:flex;flex-direction:column}.action-row{display:flex;align-items:center;gap:12px;border:0;border-bottom:1px solid var(--border);background:none;padding:12px 2px;text-align:left;color:var(--text)}.action-row:hover{color:var(--gold-dim)}.action-row span:not(.action-icon){display:flex;flex-direction:column}.action-row b{font-size:13px}.action-row small{color:var(--muted);font-size:11px;margin-top:2px}.action-icon{display:grid;place-items:center;width:30px;height:30px;border:1px solid var(--border);color:var(--gold-dim);font-size:16px}.module-note{margin-top:18px;padding:13px;background:var(--panel2);display:flex;flex-direction:column;gap:4px}.module-note b{font-size:12px}.module-note span{font-size:11px;color:var(--muted)}.loading-state{color:var(--muted);font-size:12px;padding:20px 0}
details.json-details summary{cursor:pointer;color:var(--muted);font-size:11px}
 .pipeline-table-wrap{overflow-x:auto}.pipeline-table tr[data-lead-id]{cursor:pointer}.pipeline-table tr[data-lead-id]:hover td{background:var(--panel2)}.pipeline-table td small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.lead-stage,.lead-temp{display:inline-block;border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.05em}.stage-new{color:var(--blue)}.stage-qualified,.stage-won{color:var(--green)}.stage-negotiation,.stage-viewing{color:var(--amber)}.stage-lost{color:var(--red)}.temp-hot{color:var(--red);border-color:#d3a39b}.temp-warm{color:var(--amber);border-color:#d8bc91}.temp-cold{color:var(--blue);border-color:#a7bdcb}.overdue{color:var(--red);font-weight:600}.lead-modal{max-width:900px}.lead-controls{display:flex;gap:12px;margin:0 0 18px}.lead-controls>div{width:190px}.qualification-note{display:flex;flex-direction:column;gap:4px;background:var(--panel2);border-left:3px solid var(--gold);padding:12px 14px;margin:0 0 14px}.qualification-note b{font-size:12px}.qualification-note span{font-size:12px}.qualification-note small{color:var(--muted);font-size:11px}.activity-form{display:grid;grid-template-columns:130px 1fr 190px;gap:10px;align-items:end;margin-top:16px}.activity-details{grid-column:1/-2}.activity-row{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:start;border-bottom:1px solid var(--border);padding:12px 0}.activity-row.completed{opacity:.6}.activity-marker{display:grid;place-items:center;width:30px;height:30px;border:1px solid var(--gold-dim);border-radius:50%;color:var(--gold-dim);font-size:11px}.activity-row small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.activity-row p{font-size:12px;margin-top:5px}.crm-filter-grid{grid-template-columns:minmax(240px,2fr) repeat(3,minmax(140px,1fr))}

lign-items:center;text-align:left;background:var(--panel2);border:1px solid var(--border);padding:11px 13px;color:var(--text)}.intervention-row strong{font-size:18px}.intervention-row small{color:var(--muted)}.intervention-row span small{display:block;margin-top:3px}.severity-critical,.severity-high{border-left:4px solid var(--red)}.severity-medium{border-left:4px solid var(--amber)}.severity-clear{border-left:4px solid var(--green)}.trend-series{height:170px;display:flex;gap:10px;align-items:flex-end;padding-top:15px}.trend-point{display:flex;flex:1;height:100%;min-width:28px;flex-direction:column;justify-content:flex-end;align-items:center;gap:5px}.trend-point>span{width:70%;height:var(--bar);min-height:8px;background:linear-gradient(var(--gold-dim),var(--gold));opacity:.72}.trend-point b{font-size:11px}.trend-point small{font-size:9px;color:var(--muted)}.leading-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.leading-card{display:flex;flex-direction:column;align-items:flex-start;gap:6px;text-align:left;color:var(--text);background:var(--panel2);border:1px solid var(--border);padding:13px}.leading-card strong{font-size:20px;color:var(--gold-dim)}.leading-card small{font-size:10px;color:var(--muted);line-height:1.35}.hierarchy-tree{display:flex;flex-direction:column;gap:10px}.hierarchy-node.company{font-weight:700;color:var(--gold-dim);border-left:3px solid var(--gold);padding:7px 10px;background:var(--panel2)}.hierarchy-tree summary{cursor:pointer;font-size:12px;font-weight:700;padding:6px}.hierarchy-level{display:flex;align-items:center;gap:7px;flex-wrap:wrap;border-left:1px solid var(--border);margin-left:10px;padding:8px 0 8px 14px}.hierarchy-level button{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 8px;font-size:10px}.hierarchy-level button:hover{border-color:var(--gold-dim)}.hierarchy-level span{font-size:10px;color:var(--muted)}.maturity-row{display:flex;flex-direction:column;gap:3px;padding:10px 0;bor  .overview-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.overview-grid article{display:flex;flex-direction:column;gap:5px;background:var(--panel2);border:1px solid var(--border);border-top:3px solid var(--gold);padding:13px;min-height:108px}.overview-grid span{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em}.overview-grid b{color:var(--gold-dim);font-size:17px}.overview-grid small{color:var(--muted);font-size:10px;line-height:1.35}.record-breadcrumb{display:block;margin-top:4px;color:var(--muted);font-size:10px;line-height:1.35}
